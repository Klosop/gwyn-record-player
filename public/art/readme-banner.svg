<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Gwyn's Little Record Player</title>
  <desc id="desc">A warm pink illustrated record player surrounded by stars, hearts, and handwritten music notes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff8ef"/>
      <stop offset=".5" stop-color="#f7dce3"/>
      <stop offset="1" stop-color="#eadbd3"/>
    </linearGradient>
    <linearGradient id="case" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f4cbcd"/>
      <stop offset=".62" stop-color="#dda5ad"/>
      <stop offset="1" stop-color="#c98391"/>
    </linearGradient>
    <radialGradient id="vinyl">
      <stop offset=".19" stop-color="#f6d58f"/>
      <stop offset=".2" stop-color="#252126"/>
      <stop offset=".72" stop-color="#302a30"/>
      <stop offset=".73" stop-color="#171519"/>
      <stop offset="1" stop-color="#383038"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="13" stdDeviation="12" flood-color="#714750" flood-opacity=".25"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#794b57" opacity=".15"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="36" fill="url(#sky)"/>
  <path d="M0 318 C180 270 300 370 470 326 S770 274 930 332 S1090 354 1200 316 V420 H0Z" fill="#fff9ee" opacity=".68"/>
  <g fill="#ad6c7b" opacity=".65" font-family="Georgia, serif">
    <text x="90" y="102" font-size="34">♪</text>
    <text x="1085" y="112" font-size="30">♫</text>
    <text x="1000" y="326" font-size="26">♪</text>
    <text x="163" y="338" font-size="24">♡</text>
  </g>
  <g fill="#fffaf0" stroke="#c78392" stroke-width="3">
    <path d="M104 202 l7 15 16 2-12 11 3 16-14-8-14 8 3-16-12-11 16-2z"/>
    <path d="M1096 221 l5 11 12 1-9 8 3 12-11-6-10 6 2-12-9-8 12-1z"/>
  </g>

  <g transform="translate(350 73)" filter="url(#shadow)">
    <rect width="500" height="290" rx="36" fill="url(#case)" stroke="#985c69" stroke-width="10"/>
    <rect x="8" y="8" width="484" height="274" rx="28" fill="url(#dots)"/>
    <circle cx="182" cy="145" r="120" fill="#4b4148" opacity=".28"/>
    <circle cx="182" cy="137" r="112" fill="url(#vinyl)" stroke="#6f5e64" stroke-width="7"/>
    <circle cx="182" cy="137" r="34" fill="#f3cbd0"/>
    <circle cx="182" cy="137" r="5" fill="#574249"/>
    <g fill="none" stroke="#fff" opacity=".1">
      <circle cx="182" cy="137" r="82"/>
      <circle cx="182" cy="137" r="92"/>
      <circle cx="182" cy="137" r="102"/>
    </g>
    <g transform="translate(390 32) rotate(24 22 20)">
      <circle cx="22" cy="22" r="25" fill="#75676a" stroke="#efe0cb" stroke-width="5"/>
      <rect x="17" y="25" width="10" height="180" rx="5" fill="#eadbc8" stroke="#88787a" stroke-width="3"/>
      <rect x="7" y="186" width="30" height="35" rx="9" fill="#5c4e53"/>
    </g>
    <g transform="translate(444 195)">
      <rect width="12" height="65" rx="6" fill="#77565e"/>
      <rect x="-11" y="29" width="34" height="16" rx="5" fill="#f7e7d2" stroke="#8f6971" stroke-width="2"/>
    </g>
    <text x="455" y="36" text-anchor="end" fill="#8f5965" font-family="Georgia, serif" font-size="24" font-style="italic">g.</text>
  </g>

  <g text-anchor="middle" fill="#684a53">
    <text x="600" y="42" font-family="Georgia, serif" font-size="27" font-style="italic">♡ a tiny digital keepsake ♡</text>
    <text x="600" y="400" font-family="Georgia, serif" font-size="24" font-style="italic" opacity=".82">girl, put your records on ♪</text>
  </g>
</svg>
